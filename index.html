<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./imgs/poke-ball.png" />

    <script>
      // Saves the user's theme preference in localStorage and applies it on page load
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "dark") {
        document.documentElement.classList.add("dark-theme");
        document.getElementById("loading-pikachu").style.backgroundColor =
          "#2d2d2d";
      }
    </script>

    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="./src/media.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>Pokédex</title>
  </head>
  <body>
    <div id="loading-pikachu">
      <img src="./imgs/pikachu-pixel-loading.gif" alt="loading.." />
    </div>
    <header id="header" class="header">
      <img class="img" id="psyduck" src="./imgs/psyduck.png" alt="psyduck" />
      <img id="sound" class="img" src="./imgs/volume-mute.png" alt="volume" />
    </header>

    <div class="form-container">
      <form id="form">
        <input
          id="input"
          class="prompt"
          type="text"
          placeholder="Search for a Pokémon"
        />
        <button type="submit" id="btn-search" class="btn-search" name="btn">
          <i class="fa fa-search"></i>
        </button>
      </form>
    </div>

    <div class="main-content" id="main-content">
      <div class="select-pokemon-card-container">
        <div id="render-pokemon">
          <div class="pokemon-cards-container"></div>
        </div>
      </div>

      <div class="display-pokemon-container" id="display-pokemon-container">
        <div class="display-pokemon" id="selected-pokemon">
          <img
            class="no-selected-pokemon"
            id="pixel-pikachu"
            src="./imgs/pikachu-pixel.gif"
            alt="Pikachu pixel"
          />
          <h3>Select a Pokémon to display here</h3>
        </div>
      </div>
    </div>
    <script src="./src/main.js"></script>
    <script src="./src/render.js"></script>
  </body>
</html>
